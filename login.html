<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – ShopVerse</title>
  <script src="paths.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page" data-auth="login">

<div id="site-header"></div>

<main class="auth-container">
  <div class="auth-card">
    <div class="auth-tabs">
      <button type="button" class="auth-tab active" data-tab="user">Customer</button>
      <button type="button" class="auth-tab" data-tab="admin">Admin</button>
    </div>

    <h1 id="auth-title">Login to ShopVerse</h1>
    <p class="auth-sub">Shop deals, track orders & checkout faster</p>

    <div id="auth-error" class="auth-error" hidden></div>

    <form id="login-form" class="auth-form">
      <label>Email</label>
      <input type="email" id="login-email" required placeholder="user@shopverse.com" autocomplete="username">
      <label>Password</label>
      <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
      <button type="submit" class="btn-primary full">Sign In</button>
    </form>

    <hr class="auth-divider">
    <p class="auth-switch">New customer? <button type="button" id="show-register">Create account</button></p>

    <form id="register-form" class="auth-form" hidden>
      <label>Full Name</label>
      <input type="text" id="reg-name" required placeholder="Your name">
      <label>Email</label>
      <input type="email" id="reg-email" required placeholder="you@email.com">
      <label>Password</label>
      <input type="password" id="reg-password" required minlength="6" placeholder="Min 6 characters">
      <button type="submit" class="btn-primary full">Register</button>
      <button type="button" class="btn-text" id="back-login">Back to login</button>
    </form>

    <div class="demo-credentials">
      <p><strong>Demo accounts</strong></p>
      <p>Customer: user@shopverse.com / user123</p>
      <p>Admin: admin@shopverse.com / admin123</p>
    </div>
  </div>
</main>

<script src="products.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>
<script src="ui.js"></script>
<script>
  let activeRole = new URLSearchParams(location.search).get("role") === "admin" ? "admin" : "user";
  const redirect = new URLSearchParams(location.search).get("redirect") || "index.html";

  function setTab(role) {
    activeRole = role;
    document.querySelectorAll(".auth-tab").forEach((t) => t.classList.toggle("active", t.dataset.tab === role));
    document.getElementById("auth-title").textContent = role === "admin" ? "Admin Login" : "Login to ShopVerse";
    document.getElementById("show-register").parentElement.style.display = role === "admin" ? "none" : "block";
    if (role === "admin") {
      document.getElementById("register-form").hidden = true;
      document.getElementById("login-form").hidden = false;
    }
  }

  document.querySelectorAll(".auth-tab").forEach((btn) => {
    btn.addEventListener("click", () => setTab(btn.dataset.tab));
  });

  document.getElementById("show-register").addEventListener("click", () => {
    document.getElementById("login-form").hidden = true;
    document.getElementById("register-form").hidden = false;
  });
  document.getElementById("back-login").addEventListener("click", () => {
    document.getElementById("register-form").hidden = true;
    document.getElementById("login-form").hidden = false;
  });

  function showError(msg) {
    const el = document.getElementById("auth-error");
    el.textContent = msg;
    el.hidden = false;
  }

  document.getElementById("login-form").addEventListener("submit", (e) => {
    e.preventDefault();
    document.getElementById("auth-error").hidden = true;
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;
    const res = loginUser(email, password, activeRole);
    if (!res.ok) return showError(res.message);
    window.location.href = activeRole === "admin" ? "admin.html" : redirect;
  });

  document.getElementById("register-form").addEventListener("submit", (e) => {
    e.preventDefault();
    const res = registerUser(
      document.getElementById("reg-name").value,
      document.getElementById("reg-email").value,
      document.getElementById("reg-password").value
    );
    if (!res.ok) return showError(res.message);
    loginUser(document.getElementById("reg-email").value, document.getElementById("reg-password").value);
    window.location.href = redirect;
  });

  setTab(activeRole);
  if (getSession()) {
    const s = getSession();
    window.location.href = s.role === "admin" ? "admin.html" : redirect;
  }
</script>
</body>
</html>
